# ServiceAccount for Spark driver pods.
# The driver needs permission to create/manage executor pods in this namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "stock-pipeline.fullname" . }}-spark-driver
  labels:
    {{- include "stock-pipeline.labels" . | nindent 4 }}
    app.kubernetes.io/component: spark
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "stock-pipeline.fullname" . }}-spark-driver-role
  labels:
    {{- include "stock-pipeline.labels" . | nindent 4 }}
    app.kubernetes.io/component: spark
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "stock-pipeline.fullname" . }}-spark-driver-rb
  labels:
    {{- include "stock-pipeline.labels" . | nindent 4 }}
    app.kubernetes.io/component: spark
subjects:
  - kind: ServiceAccount
    name: {{ include "stock-pipeline.fullname" . }}-spark-driver
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "stock-pipeline.fullname" . }}-spark-driver-role
  apiGroup: rbac.authorization.k8s.io
