apiVersion: v1
kind: Service
metadata:
  name: {{ include "stock-pipeline.fullname" . }}-postgres
  labels:
    {{- include "stock-pipeline.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    {{- include "stock-pipeline.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
