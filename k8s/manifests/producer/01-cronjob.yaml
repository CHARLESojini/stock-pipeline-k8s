apiVersion: batch/v1
kind: CronJob
metadata:
  name: stock-producer
  namespace: producer
  labels:
    app: stock-producer
spec:
  schedule: "*/30 * * * *"  # Every 30 minutes — fits Alpha Vantage free tier (240 calls/day)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: stock-producer
        spec:
          restartPolicy: OnFailure
          containers:
            - name: producer
              image: localhost:5001/stock-producer:v1
              imagePullPolicy: Always
              env:
                - name: KAFKA_BOOTSTRAP_SERVER
                  value: "stock-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
              envFrom:
                - secretRef:
                    name: alpha-vantage-creds
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"
